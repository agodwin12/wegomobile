name: wego_v1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.2
  dio: ^5.5.0+1
  socket_io_client: ^2.0.3+1
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.1
  provider: ^6.1.2
  intl: ^0.19.0
  timeago: ^3.6.1
  flutter_map: ^8.3.0
  google_sign_in: ^7.2.0
  latlong2: ^0.9.0
  device_info_plus:
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  geolocator: ^10.1.0
  video_player: ^2.8.3
  carousel_slider: ^5.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  permission_handler: ^11.0.1
  audioplayers: ^5.2.1
  cupertino_icons: ^1.0.8
  image_cropper: ^12.2.1
  webview_flutter: ^4.7.0
  flutter_tts: ^4.0.2
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  # Full icon (white bg + black 3-bar mark, enlarged) — iOS & legacy Android.
  image_path: "assets/icon_full.png"
  # Adaptive icon: white background + transparent black-bars foreground sized
  # for the 66% safe zone, so no launcher shape crops it.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon_fg.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/car.png
    - assets/images/logo.jpg
    - assets/images/logo.png
    - assets/images/comfort.png
    - assets/images/luxury.png
    - assets/images/economy.png
    - assets/images/ride.png
    - assets/images/rental.png
    - assets/images/rental_service.png
    - assets/images/delivery.png
    - assets/images/services.jpg
    - assets/images/
    - assets/lottie/
    - assets/
    - .env
    - assets/sounds/trip_notification.mp3

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700