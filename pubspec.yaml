name: wego_v1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"


dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.2
  dio: ^5.5.0+1
  socket_io_client: ^2.0.3+1
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.1
  provider: ^6.1.2
  intl: ^0.19.0
  google_maps_flutter: ^2.7.0
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  flutter_launcher_icons: ^0.14.2
  carousel_slider: ^5.0.0
  google_sign_in: ^6.1.5
  google_places_flutter: ^2.0.9
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  permission_handler: ^11.0.1
  audioplayers: ^5.2.1
  cupertino_icons: ^1.0.8
  image_cropper: ^7.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.jpg
    - assets/images/logo.png
    - assets/images/comfort.png
    - assets/images/luxury.png
    - assets/images/economy.png
    - assets/images/ride.png
    - assets/images/rental.png
    - assets/images/rental_service.png
    - assets/images/delivery.png
    - assets/images/services.jpg
    - assets/images/
    - .env
    - assets/sounds/trip_notification.mp3

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
